<div class="container mt-5">
  <div class="text-center my-4" *ngIf="loading">
    Loading...
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="card border-0 p-4" *ngIf="employee" appCardHover>
    <h2 class="mb-4">Employee Details</h2>

    <div class="mb-3" *ngIf="employee.picture">
      <img [src]="employee.picture" alt="employee" width="140" height="140" style="object-fit: cover; border-radius: 12px;">
    </div>

    <p><strong>Name:</strong> {{ employee | fullName }}</p>
    <p><strong>Email:</strong> {{ employee.email }}</p>
    <p><strong>Department:</strong> {{ employee.department }}</p>
    <p><strong>Position:</strong> {{ employee.position }}</p>

    <a routerLink="/employees" class="btn btn-primary mt-3">Back</a>
  </div>
</div>
